apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flappy-fun
  namespace: flappy-fun-dev
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flappy-fun
                port:
                  number: 80
